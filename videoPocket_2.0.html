<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VideoPocket | Smart Video Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0c15;
            --bg-surface: #11131f;
            --card-bg: #181c2c;
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-dim: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(17, 19, 31, 0.85);
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .login-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, #0f1222, #05060a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-dim);
            border-radius: 2rem;
            padding: 2.2rem;
            width: 92%;
            max-width: 440px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
        }

        .logo-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-tab-group {
            display: flex;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.4rem;
            border-radius: 3rem;
            margin-bottom: 1.8rem;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 600;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .input-modern {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(10, 12, 21, 0.7);
            border: 1px solid var(--border-dim);
            border-radius: 1rem;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .input-modern:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-glow {
            background: linear-gradient(105deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 0.9rem;
            border-radius: 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(105deg, #334155, #1e293b);
        }

        .app-container {
            opacity: 0;
            transition: opacity 0.5s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container.visible {
            opacity: 1;
        }

        .glass-header {
            background: rgba(10, 12, 21, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-dim);
            padding: 0.75rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .logo-sm {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #a5b4fc, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.3rem 1rem 0.3rem 0.6rem;
            border-radius: 2rem;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .main-content {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .input-strip {
            background: var(--bg-surface);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            border: 1px solid var(--border-dim);
            margin-bottom: 1.5rem;
        }

        .input-group-flex {
            flex: 2;
            min-width: 180px;
            position: relative;
        }

        .input-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .quick-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-dim);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            width: 100%;
            color: white;
            padding-right: 2rem;
        }

        .clear-field-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 6px;
            border-radius: 20px;
            transition: 0.2s;
            display: none;
        }

        .clear-field-btn:hover {
            background: var(--danger);
            color: white;
        }

        .quick-input:not(:placeholder-shown) + .clear-field-btn,
        .quick-input:focus + .clear-field-btn {
            display: block;
        }

        .btn-sm {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            background: var(--primary);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .playlist-bar {
            background: var(--bg-surface);
            border-radius: 1.2rem;
            padding: 0.8rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-dim);
        }

        .playlist-selector {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .playlist-selector select {
            min-width: 150px;
        }

        .playlist-actions {
            display: flex;
            gap: 0.5rem;
        }

        .playlist-action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .playlist-action-btn:hover {
            background: var(--primary);
            color: white;
        }

        .playlist-action-btn.delete:hover {
            background: var(--danger);
        }

        .select-modern {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dim);
            padding: 0.6rem 2rem 0.6rem 1rem;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .action-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .search-wrap {
            position: relative;
            flex: 2;
            min-width: 200px;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-input-mod {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.4rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-dim);
            border-radius: 2rem;
            color: white;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .pill {
            background: transparent;
            border: 1px solid var(--border-dim);
            padding: 0.45rem 1.2rem;
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .pill.active,
        .pill:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .bulk-bar {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .video-grid-modern {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .video-card-mod {
            background: var(--card-bg);
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid var(--border-dim);
            transition: all 0.25s ease;
            position: relative;
        }

        .video-card-mod:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
        }

        .card-media {
            position: relative;
            cursor: pointer;
            height: 170px;
            background: #000;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-btn-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
        }

        .card-media:hover .play-btn-overlay {
            opacity: 1;
        }

        .card-info {
            padding: 1rem;
        }

        .title-row {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.5rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin: 0.5rem 0;
            flex-wrap: wrap;
            gap: 6px;
        }

        .playlist-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--primary-glow);
            margin-top: 0.4rem;
            width: fit-content;
            max-width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-label:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: scale(1.02);
        }

        .playlist-label i {
            font-size: 0.6rem;
        }

        .playlist-label.unassigned {
            background: rgba(148, 163, 184, 0.15);
            border-color: rgba(148, 163, 184, 0.3);
            color: var(--text-secondary);
        }

        .playlist-label.favorites {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.3);
            color: #f59e0b;
        }

        .playlist-label.watch-later {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .card-actions-row {
            display: flex;
            justify-content: space-between;
            margin-top: 0.8rem;
            border-top: 1px solid var(--border-dim);
            padding-top: 0.7rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            padding: 0.3rem 0.5rem;
            border-radius: 0.5rem;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .icon-btn.del:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .icon-btn.move:hover {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
        }

        .checkbox-select {
            position: absolute;
            top: 10px;
            left: 12px;
            width: 26px;
            height: 26px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            border: 1.5px solid white;
            transition: 0.2s;
        }

        .checkbox-select.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .modal-glass {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }

        .modal-glass.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: var(--bg-surface);
            border-radius: 1.8rem;
            padding: 1.8rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-dim);
            max-height: 90vh;
            overflow-y: auto;
        }

        .avatar-editor-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
        }

        .editor-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 0.5rem;
        }

        .editor-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.5rem;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .editor-tab.active {
            background: var(--primary);
            color: white;
        }

        .editor-canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        .avatar-preview-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .editor-controls {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-width: 70px;
        }

        .control-group input[type="range"] {
            flex: 1;
            background: var(--border-dim);
            height: 4px;
            border-radius: 5px;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]:focus {
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .control-value {
            font-size: 0.75rem;
            color: var(--primary);
            min-width: 45px;
            text-align: right;
        }

        .icon-button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .icon-btn-sm {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-dim);
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .icon-btn-sm:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
            border: none;
        }

        .upload-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .toast-fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast-item {
            background: #1e293b;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            border-left: 4px solid var(--success);
            animation: slideToast 0.2s ease;
            font-size: 0.9rem;
        }

        @keyframes slideToast {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 680px) {
            .main-content {
                padding: 1rem;
            }
            .glass-header {
                padding: 0.7rem 1rem;
            }
            .input-strip {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-sm {
                justify-content: center;
            }
            .video-grid-modern {
                grid-template-columns: 1fr;
            }
            .modal-card {
                width: 95%;
                padding: 1rem;
            }
            .control-group {
                flex-wrap: wrap;
            }
            .playlist-selector {
                width: 100%;
            }
            .playlist-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN PANEL -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="text-center mb-4" style="text-align:center; margin-bottom:1rem;">
                <i class="fas fa-play-circle logo-icon"></i>
                <h2 style="margin-top: 8px;">VideoPocket</h2>
                <p style="color:#94a3b8;">Secure & smart</p>
            </div>
            <div class="auth-tab-group">
                <button class="auth-tab active" onclick="switchAuth('login')">Login</button>
                <button class="auth-tab" onclick="switchAuth('register')">Register</button>
                <button class="auth-tab" onclick="switchAuth('recover')">Recover</button>
            </div>
            <form id="loginFormAuth" onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" placeholder="Username" class="input-modern" style="margin-bottom: 1rem;">
                <input type="password" id="loginPass" placeholder="Password" class="input-modern" style="margin-bottom: 1.5rem;">
                <button class="btn-glow w-100" style="width:100%"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
            </form>
            <form id="registerFormAuth" style="display:none;" onsubmit="handleRegister(event)">
                <input type="text" id="regUser" placeholder="Username" class="input-modern" style="margin-bottom: 0.8rem;">
                <input type="email" id="regEmail" placeholder="Email" class="input-modern" style="margin-bottom: 0.8rem;">
                <select id="regQuestion" class="input-modern" style="margin-bottom: 0.8rem;">
                    <option value="pet">First pet's name?</option>
                    <option value="city">Birth city?</option>
                    <option value="school">Elementary school?</option>
                </select>
                <input type="text" id="regAnswer" placeholder="Security answer" class="input-modern" style="margin-bottom: 0.8rem;">
                <input type="password" id="regPass" placeholder="Password" class="input-modern" style="margin-bottom: 0.8rem;">
                <input type="password" id="regConfirm" placeholder="Confirm" class="input-modern" style="margin-bottom: 1rem;">
                <button class="btn-glow w-100"><i class="fas fa-user-plus"></i> Register</button>
            </form>
            <form id="recoverFormAuth" style="display:none;" onsubmit="handleRecovery(event)">
                <input type="text" id="recUser" placeholder="Username" class="input-modern" style="margin-bottom: 1rem;">
                <div id="recoveryFields" style="display:none;">
                    <input type="text" id="recAnswer" placeholder="Security answer" class="input-modern" style="margin-bottom: 0.8rem;">
                    <input type="password" id="newPass" placeholder="New password" class="input-modern" style="margin-bottom: 0.8rem;">
                    <input type="password" id="newPassConfirm" placeholder="Confirm" class="input-modern" style="margin-bottom: 1rem;">
                </div>
                <button class="btn-glow w-100" id="recoverBtnAction"><i class="fas fa-key"></i> Find account</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="appContainer">
        <div class="glass-header">
            <div class="logo-sm"><i class="fas fa-play-circle"></i> VideoPocket</div>
            <div class="user-badge">
                <img id="avatarHeader" class="avatar" src="" alt="avatar" onclick="openSettingsModal()">
                <span id="usernameHeader"></span>
                <button onclick="logout()" style="background:rgba(239,68,68,0.2); border:none; padding:6px 12px; border-radius:30px; color:#ef4444; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
                <button onclick="openSettingsModal()" style="background:transparent; border:none; color:#94a3b8; font-size:1.2rem; cursor:pointer;"><i class="fas fa-cog"></i></button>
            </div>
        </div>
        <div class="main-content">
            <div class="input-strip">
                <div class="input-group-flex">

            <!-- SHARE PLAYLIST SECTION - NEW FEATURE -->

                    <button class="icon-btn move" onclick="moveSelected()"><i class="fas fa-folder-open"></i> Move</button>
                    <button class="icon-btn del" onclick="deleteSelected()"><i class="fas fa-trash-alt"></i> Del</button>
                    <button class="icon-btn" onclick="clearSelections()"><i class="fas fa-times"></i></button>

            <div class="action-toolbar">

                <div class="filter-group">

    <!-- RENAME PLAYLIST MODAL -->
    <div id="renamePlaylistModal" class="modal-glass">
        <div class="modal-card">
            <h3><i class="fas fa-edit"></i> Rename Playlist</h3>

            <div style="display:flex; gap:1rem;">
                <button onclick="createPlaylistFinal()" class="btn-glow">Create</button>

    <!-- VIDEO PLAYER MODAL -->
    <div id="videoPlayerModal" class="modal-glass">

                <button onclick="closeVideoPlayer()" style="background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer;"><i class="fas fa-times"></i></button>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal-glass">
        <div class="modal-card">
            <h3><i class="fas fa-user-edit"></i> Profile Settings</h3>
            <div style="display: flex; justify-content: center; margin: 1rem 0;">
                <img id="modalAvatar" class="avatar-preview-circle" style="width: 120px; height: 120px;" src="" alt="avatar">
            </div>
            <div class="editor-tabs">
                <button class="editor-tab active" onclick="switchEditorMode('crop')">✂️ Simple Crop</button>
                <button class="editor-tab" onclick="switchEditorMode('advanced')">🎨 Advanced Editor</button>
            </div>
            <div id="cropMode" class="avatar-editor-container">
                <button class="upload-btn" style="width:100%; margin-bottom:1rem;" onclick="document.getElementById('avatarFileInput').click()"><i class="fas fa-camera"></i> Upload New Photo</button>
                <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleSimpleUpload(this)">

                    <div class="control-group"><label>Zoom:</label><input type="range" id="cropZoom" min="1" max="3" step="0.01" value="1"><span class="control-value" id="cropZoomValue">1.00x</span></div>

                <button class="upload-btn" style="width:100%; margin-bottom:1rem;" onclick="document.getElementById('advancedFileInput').click()"><i class="fas fa-camera"></i> Upload New Photo</button>
                <input type="file" id="advancedFileInput" accept="image/*" style="display:none" onchange="handleAdvancedUpload(this)">
                <div id="advancedControls" style="display:none;">
                    <div class="editor-canvas-wrapper"><canvas id="advancedCanvas" width="200" height="200" style="width:200px; height:200px; border-radius:50%;"></canvas></div>
                    <div class="editor-controls">
                        <div class="control-group"><label><i class="fas fa-search-plus"></i> Zoom</label><input type="range" id="advZoom" min="0.5" max="2.5" step="0.01" value="1"><span class="control-value" id="advZoomValue">1.00x</span></div>
                        <div class="control-group"><label><i class="fas fa-arrows-alt"></i> Position X</label><input type="range" id="advPosX" min="-100" max="100" step="1" value="0"><span class="control-value" id="advPosXValue">0</span></div>
                        <div class="control-group"><label><i class="fas fa-arrows-alt"></i> Position Y</label><input type="range" id="advPosY" min="-100" max="100" step="1" value="0"><span class="control-value" id="advPosYValue">0</span></div>
                        <div class="icon-button-group">
                            <button onclick="rotateImage(-15)" class="icon-btn-sm"><i class="fas fa-undo-alt"></i> -15°</button>
                            <button onclick="rotateImage(15)" class="icon-btn-sm"><i class="fas fa-redo-alt"></i> +15°</button>
                            <button onclick="flipHorizontal()" class="icon-btn-sm"><i class="fas fa-arrows-alt-h"></i> Flip H</button>
                            <button onclick="flipVertical()" class="icon-btn-sm"><i class="fas fa-arrows-alt-v"></i> Flip V</button>
                            <button onclick="resetAdvanced()" class="icon-btn-sm"><i class="fas fa-sync-alt"></i> Reset</button>
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <button onclick="applyAdvancedEdit()" class="btn-glow" style="flex:1; padding:0.5rem;"><i class="fas fa-check"></i> Apply & Save</button>
                            <button onclick="cancelAdvancedEdit()" class="btn-glow btn-secondary" style="flex:1; padding:0.5rem;"><i class="fas fa-times"></i> Cancel</button>
                        </div>

                </div>
            </div>
            <input type="text" id="newUsername" placeholder="Username" class="input-modern" style="margin:1rem 0;">
            <input type="password" id="newPasswordSettings" placeholder="New password (optional)" class="input-modern">
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button onclick="saveSettings()" class="btn-glow" style="flex:1">Save All Changes</button>
                <button onclick="closeModal('settingsModal')" class="btn-glow btn-secondary" style="flex:1">Cancel</button>
            </div>

    <div id="moveModal" class="modal-glass">
        <div class="modal-card">
            <h3><i class="fas fa-folder-open"></i> Move to Playlist</h3>
            <select id="moveSelectPlaylist" class="select-modern" style="width:100%; margin:1rem 0;"></select>
            <button onclick="confirmMove()" class="btn-glow">Move Videos</button>
            <button onclick="closeModal('moveModal')" class="btn-glow btn-secondary" style="margin-top:0.5rem;">Cancel</button>
        </div>
    </div>
    
    <div class="toast-fixed" id="toastRoot"></div>

    <script>
        // ========== DATA LAYER ==========
        let db = JSON.parse(localStorage.getItem('videoPocketDB')) || { users: {}, currentUser: null };
        let currentUserObj = null;
        let videos = [], playlists = {};
        let currentPlaylistId = 'all', currentFilterType = 'all', searchText = '';
        let selectedVideoIds = new Set();
        
        let sharedImageData = null;
        let sharedImage = null;
        let currentEditorMode = 'crop';
        let advRotation = 0, advFlipH = false, advFlipV = false;

        // ========== PLAYLIST MANAGEMENT ==========
        function updatePlaylistButtons() {
            const renameBtn = document.getElementById('renamePlaylistBtn');
            const deleteBtn = document.getElementById('deletePlaylistBtn');
            const isCustomPlaylist = currentPlaylistId !== 'all' && currentPlaylistId !== 'unassigned' && playlists[currentPlaylistId];
            renameBtn.style.display = isCustomPlaylist ? 'inline-flex' : 'none';
            deleteBtn.style.display = isCustomPlaylist ? 'inline-flex' : 'none';
        }

        function renameCurrentPlaylist() {
            if (currentPlaylistId === 'all' || currentPlaylistId === 'unassigned') {
                toast('Cannot rename default playlists', 'error');
                return;
            }
            if (!playlists[currentPlaylistId]) {
                toast('Playlist not found', 'error');
                return;
            }
            document.getElementById('renamePlaylistInput').value = playlists[currentPlaylistId]?.name || '';
            document.getElementById('renamePlaylistModal').classList.add('active');
        }

        function confirmRenamePlaylist() {
            const newName = document.getElementById('renamePlaylistInput').value.trim();
            if (!newName) return toast('Playlist name required', 'error');
            if (playlists[currentPlaylistId]) {
                playlists[currentPlaylistId].name = newName;
                db.users[db.currentUser].playlists = playlists;
                saveFullDB();
                renderPlaylistSelectors();
                document.getElementById('playlistSelectMain').value = currentPlaylistId;
                renderGrid();
                toast(`Playlist renamed to "${newName}"`);
                closeModal('renamePlaylistModal');
            }
        }

        function deleteCurrentPlaylist() {
            if (currentPlaylistId === 'all' || currentPlaylistId === 'unassigned') {
                toast('Cannot delete default playlists', 'error');
                return;
            }
            if (!playlists[currentPlaylistId]) {
                toast('Playlist not found', 'error');
                return;
            }
            const playlistName = playlists[currentPlaylistId]?.name || 'this playlist';
            if (confirm(`Delete "${playlistName}"? Videos will be moved to "Unassigned".`)) {
                // Move all videos from this playlist to unassigned
                videos.forEach(v => {
                    if (v.playlistId === currentPlaylistId) {
                        v.playlistId = 'unassigned';
                    }
                });
                // Delete the playlist
                delete playlists[currentPlaylistId];
                db.users[db.currentUser].playlists = playlists;
                db.users[db.currentUser].videos = videos;
                saveFullDB();
                
                // CRITICAL FIX: Properly reset to All Videos
                currentPlaylistId = 'all';
                
                // Re-render the playlist selector and set value to 'all'
                renderPlaylistSelectors();
                const playlistSelect = document.getElementById('playlistSelectMain');
                playlistSelect.value = 'all';
                
                // Update buttons and render grid
                updatePlaylistButtons();
                renderGrid();
                
                toast(`Playlist "${playlistName}" deleted. All videos are now in "All Videos".`);
            }
        }

        // ========== ENTER KEY HANDLERS ==========
        function handleUrlKeydown(event) {
            if (event.key === 'Escape') {
                document.getElementById('videoUrl').value = '';
                toast('URL field cleared');
            } else if (event.key === 'Enter') {
                event.preventDefault();
                addVideo();
            }
        }
        
        function handleInputKeydown(event, fieldType) {
            if (event.key === 'Escape') {
                if (fieldType === 'title') {
                    document.getElementById('videoTitle').value = '';
                    toast('Title field cleared');
                }
            }
        }
        
        function clearField(fieldId) {
            document.getElementById(fieldId).value = '';
            toast(`${fieldId === 'videoUrl' ? 'URL' : 'Title'} field cleared`);
        }

        // ========== VIDEO PLAYER ==========
        function playVideo(url, title) {
            const container = document.getElementById('videoPlayerContainer');
            const titleElement = document.getElementById('videoPlayerTitle');
            titleElement.textContent = title || 'Now Playing';
            
            let embedHtml = '';
            if (url.includes('youtube.com/watch') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                else if (url.includes('watch?v=')) videoId = url.split('v=')[1].split('&')[0];
                embedHtml = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>`;
            } else if (url.includes('vimeo.com')) {
                let videoId = url.split('vimeo.com/')[1].split('?')[0];
                embedHtml = `<iframe src="https://player.vimeo.com/video/${videoId}?autoplay=1" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>`;
            } else if (url.match(/\.(mp4|webm|ogg|mov)$/i)) {
                embedHtml = `<video controls autoplay style="position:absolute; top:0; left:0; width:100%; height:100%;"><source src="${url}" type="video/mp4"></video>`;
            } else {
                embedHtml = `<iframe src="${url}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>`;
            }
            container.innerHTML = embedHtml;
            document.getElementById('videoPlayerModal').classList.add('active');
        }
        
        function closeVideoPlayer() {
            document.getElementById('videoPlayerContainer').innerHTML = '';
            document.getElementById('videoPlayerModal').classList.remove('active');
        }

        async function sha256(m) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function toast(msg, type = 'success') {
            const t = document.getElementById('toastRoot');
            const el = document.createElement('div');
            el.className = 'toast-item';
            el.style.borderLeftColor = type === 'error' ? '#ef4444' : '#10b981';
            el.innerHTML = `<i class="fas ${type==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`;
            t.appendChild(el);
            setTimeout(() => el.remove(), 2800);
        }

        function saveFullDB() {
            localStorage.setItem('videoPocketDB', JSON.stringify(db));
        }

        function loadUser() {
            if (!db.currentUser || !db.users[db.currentUser]) return false;
            currentUserObj = db.users[db.currentUser];
            videos = currentUserObj.videos || [];
            playlists = currentUserObj.playlists || {
                'favorites': { name: 'Favorites', videoIds: [] },
                'watch-later': { name: 'Watch Later', videoIds: [] }
            };
            currentUserObj.playlists = playlists;
            renderPlaylistSelectors();
            renderGrid();
            document.getElementById('usernameHeader').innerText = '@' + db.currentUser;
            document.getElementById('avatarHeader').src = currentUserObj.profilePic || `https://ui-avatars.com/api/?name=${db.currentUser}&background=6366f1&color=fff`;
            return true;
        }

        function renderPlaylistSelectors() {
            const sel = document.getElementById('playlistSelectMain');
            // Store current value before rebuilding
            const currentValue = currentPlaylistId;
            
            // Clear all options except the first two default ones
            while (sel.options.length > 2) sel.remove(2);
            
            // Add all custom playlists
            Object.keys(playlists).forEach(pid => {
                sel.add(new Option(playlists[pid].name, pid));
            });
            
            // Set the value to currentPlaylistId (which should be 'all' after deletion)
            sel.value = currentValue;
            currentPlaylistId = sel.value;
            updatePlaylistButtons();
            
            const moveSel = document.getElementById('moveSelectPlaylist');
            moveSel.innerHTML = '<option value="unassigned">📁 Unassigned</option>';
            Object.keys(playlists).forEach(pid => {
                moveSel.add(new Option(playlists[pid].name, pid));
            });
            
            // Update share playlist dropdown
            updateSharePlaylistSelect();
        }

        function switchPlaylist() {
            currentPlaylistId = document.getElementById('playlistSelectMain').value;
            updatePlaylistButtons();
            clearSelections();
            renderGrid();
        }

        function setFilter(type, btn) {
            currentFilterType = type;
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        }

        function filterAndRender() {
            searchText = document.getElementById('globalSearch').value.toLowerCase();
            renderGrid();
        }

        function getFilteredVideos() {
            let filtered = videos.slice();
            if (currentPlaylistId !== 'all') {
                filtered = filtered.filter(v => currentPlaylistId === 'unassigned' ? (!v.playlistId || v.playlistId === 'unassigned') : v.playlistId === currentPlaylistId);
            }
            if (currentFilterType !== 'all') filtered = filtered.filter(v => v.platform === currentFilterType);
            if (searchText) filtered = filtered.filter(v => v.title.toLowerCase().includes(searchText) || v.url.toLowerCase().includes(searchText));
            return filtered;
        }

        function getPlaylistDisplay(video) {
            const playlistId = video.playlistId;
            if (!playlistId || playlistId === 'unassigned') {
                return { name: 'Unassigned', icon: 'fa-folder-open', class: 'unassigned' };
            }
            if (playlists[playlistId]) {
                let className = '';
                if (playlistId === 'favorites') className = 'favorites';
                else if (playlistId === 'watch-later') className = 'watch-later';
                return { name: playlists[playlistId].name, icon: 'fa-folder', class: className };
            }
            return null;
        }

        function formatTimeSafe(timeValue) {
            if (!timeValue) return '--:--';
            try {
                if (typeof timeValue === 'string' && timeValue.includes(':')) {
                    let [hours, minutes] = timeValue.split(':').map(Number);
                    if (isNaN(hours)) return timeValue;
                    let ampm = hours >= 12 ? 'PM' : 'AM';
                    let hour12 = hours % 12 || 12;
                    return `${hour12}:${minutes.toString().padStart(2, '0')}${ampm}`;
                }
                return timeValue;
            } catch(e) { return '12:00AM'; }
        }

        function renderGrid() {
            // Check if we're in shared view
            if (sharedViewActive && sharedPlaylistData) {
                renderSharedGrid(sharedPlaylistData.videos);
                return;
            }
            
            const container = document.getElementById('videoGrid');
            const emptyDiv = document.getElementById('emptyMessage');
            let filtered = getFilteredVideos();
            if (filtered.length === 0) {
                emptyDiv.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            emptyDiv.style.display = 'none';
            container.innerHTML = '';
            filtered.forEach(v => {
                const isSel = selectedVideoIds.has(v.id);
                const playlistInfo = getPlaylistDisplay(v);
                const timeDisplay = formatTimeSafe(v.time);
                const card = document.createElement('div');
                card.className = 'video-card-mod';
                
                const playlistLabelHtml = playlistInfo ? `
                    <div class="playlist-label ${playlistInfo.class}" onclick="event.stopPropagation(); document.getElementById('playlistSelectMain').value = '${v.playlistId || 'unassigned'}'; switchPlaylist();">
                        <i class="fas ${playlistInfo.icon}"></i>
                        <span>${escapeHtml(playlistInfo.name)}</span>
                    </div>
                ` : '';
                
                card.innerHTML = `
                    <div class="checkbox-select ${isSel ? 'checked' : ''}" onclick="toggleSelect(${v.id})"><i class="fas fa-check" style="font-size:12px;"></i></div>
                    <div class="card-media" onclick="playVideo('${v.url.replace(/'/g, "\\'")}', '${escapeHtml(v.title).replace(/'/g, "\\'")}')">
                        <img src="${v.thumbnail}" onerror="this.src='https://placehold.co/640x360/1e293b/ffffff?text=No+Preview'">
                        <div class="play-btn-overlay"><i class="fas fa-play-circle fa-2x"></i></div>
                    </div>
                    <div class="card-info">
                        <div class="title-row" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
                        ${playlistLabelHtml}
                        <div class="meta-row">
                            <span><i class="far fa-calendar"></i> ${v.date}</span>
                            <span><i class="far fa-clock"></i> ${timeDisplay}</span>
                            <span><i class="fab fa-${v.platform === 'youtube' ? 'youtube' : (v.platform === 'vimeo' ? 'vimeo' : 'globe')}"></i> ${v.platform}</span>
                        </div>
                        <div class="card-actions-row">
                            <button class="icon-btn" onclick="copyLink('${v.url.replace(/'/g, "\\'")}')" title="Copy link"><i class="fas fa-link"></i></button>
                            <button class="icon-btn move" onclick="moveSingle(${v.id})" title="Move to playlist"><i class="fas fa-folder-plus"></i></button>
                            <button class="icon-btn del" onclick="deleteVideoById(${v.id})" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateBulkUi();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function toggleSelect(id) {
            if (selectedVideoIds.has(id)) selectedVideoIds.delete(id);
            else selectedVideoIds.add(id);
            renderGrid();
        }

        function clearSelections() {
            selectedVideoIds.clear();
            renderGrid();
        }

        function updateBulkUi() {
            const bulkDiv = document.getElementById('bulkActionsDiv');
            if (selectedVideoIds.size > 0) {
                bulkDiv.style.display = 'flex';
                document.getElementById('selectedCountBadge').innerText = selectedVideoIds.size;
            } else bulkDiv.style.display = 'none';
        }

        function moveSingle(id) {
            selectedVideoIds.clear();
            selectedVideoIds.add(id);
            openMoveModal();
        }

        function moveSelected() {
            if (selectedVideoIds.size === 0) return toast('Select videos first', 'error');
            openMoveModal();
        }

        function openMoveModal() {
            renderPlaylistSelectors();
            document.getElementById('moveModal').classList.add('active');
        }

        function confirmMove() {
            const targetPlaylist = document.getElementById('moveSelectPlaylist').value;
            const selectedIdsArray = Array.from(selectedVideoIds);
            if (selectedIdsArray.length === 0) {
                closeModal('moveModal');
                return;
            }
            
            let movedCount = 0;
            for (let vidId of selectedIdsArray) {
                const videoIndex = videos.findIndex(v => v.id === vidId);
                if (videoIndex !== -1) {
                    videos[videoIndex].playlistId = targetPlaylist;
                    movedCount++;
                }
            }
            
            if (movedCount > 0) {
                db.users[db.currentUser].videos = videos;
                saveFullDB();
                const targetName = targetPlaylist === 'unassigned' ? 'Unassigned' : (playlists[targetPlaylist]?.name || 'playlist');
                selectedVideoIds.clear();
                renderGrid();
                toast(`✅ Moved ${movedCount} video${movedCount !== 1 ? 's' : ''} to "${targetName}"`);
            } else {
                toast('No videos were moved', 'error');
            }
            closeModal('moveModal');
        }

        function deleteSelected() {
            if (selectedVideoIds.size === 0) return;
            if (confirm(`Delete ${selectedVideoIds.size} videos?`)) {
                videos = videos.filter(v => !selectedVideoIds.has(v.id));
                db.users[db.currentUser].videos = videos;
                saveFullDB();
                clearSelections();
                renderGrid();
                toast('Deleted successfully');
            }
        }

        function deleteVideoById(id) {
            if (confirm('Delete this video?')) {
                videos = videos.filter(v => v.id !== id);
                db.users[db.currentUser].videos = videos;
                saveFullDB();
                renderGrid();
                toast('Video removed');
            }
        }

        async function addVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) return toast('Enter URL', 'error');
            let title = document.getElementById('videoTitle').value.trim();
            if (!title) title = await fetchTitle(url);
            const platform = getPlatform(url);
            const newVid = {
                id: Date.now(),
                url,
                title: title || 'Untitled',
                date: new Date().toLocaleDateString(),
                time: `${new Date().getHours()}:${new Date().getMinutes()}`,
                platform,
                thumbnail: getThumb(url),
                playlistId: (currentPlaylistId === 'all' || currentPlaylistId === 'unassigned') ? 'unassigned' : currentPlaylistId
            };
            videos.unshift(newVid);
            db.users[db.currentUser].videos = videos;
            saveFullDB();
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoTitle').value = '';
            renderGrid();
            toast('Video added successfully');
        }

        async function fetchTitle(url) {
            try {
                if (url.includes('youtube')) {
                    let res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
                    if (res.ok) {
                        let d = await res.json();
                        return d.title;
                    }
                }
            } catch (e) {}
            return generateTitle(url);
        }

        function generateTitle(url) {
            try {
                let host = new URL(url).hostname;
                return `Video from ${host}`;
            } catch (e) {
                return 'Untitled';
            }
        }

        function getPlatform(url) {
            if (url.includes('youtube') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('vimeo')) return 'vimeo';
            return 'other';
        }

        function getThumb(url) {
            if (url.includes('watch?v=')) return `https://img.youtube.com/vi/${url.split('v=')[1]}/hqdefault.jpg`;
            if (url.includes('youtu.be/')) return `https://img.youtube.com/vi/${url.split('youtu.be/')[1]}/hqdefault.jpg`;
            return 'https://placehold.co/640x360/1e293b/94a3b8?text=Media';
        }

        function copyLink(u) {
            navigator.clipboard.writeText(u);
            toast('Link copied to clipboard');
        }

        // ========== AVATAR EDITOR FUNCTIONS (condensed) ==========
        function switchEditorMode(mode) {
            currentEditorMode = mode;
            document.querySelectorAll('.editor-tab').forEach(tab => tab.classList.remove('active'));
            if (mode === 'crop') {
                document.querySelector('.editor-tab:first-child').classList.add('active');
                document.getElementById('cropMode').style.display = 'block';
                document.getElementById('advancedMode').style.display = 'none';
                if (sharedImageData) { document.getElementById('simpleCropControls').style.display = 'block'; document.getElementById('cropCanvas').style.display = 'block'; drawSimpleCrop(); }
            } else {
                document.querySelector('.editor-tab:last-child').classList.add('active');
                document.getElementById('cropMode').style.display = 'none';
                document.getElementById('advancedMode').style.display = 'block';
                if (sharedImageData) { document.getElementById('advancedControls').style.display = 'block'; resetAdvanced(); drawAdvancedImage(); }
            }
        }
        
        function loadSharedImage(file) {
            if (!file) return;
            if (!file.type.match('image.*')) { toast('Please select an image file', 'error'); return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                sharedImageData = e.target.result;
                sharedImage = new Image();
                sharedImage.onload = () => {
                    if (currentEditorMode === 'crop') { document.getElementById('simpleCropControls').style.display = 'block'; document.getElementById('cropCanvas').style.display = 'block'; drawSimpleCrop(); }
                    else { document.getElementById('advancedControls').style.display = 'block'; resetAdvanced(); drawAdvancedImage(); }
                    toast('New image loaded! Adjust and click Apply & Save');
                };
                sharedImage.src = sharedImageData;
            };
            reader.readAsDataURL(file);
        }
        
        function handleSimpleUpload(input) { loadSharedImage(input.files[0]); }
        function drawSimpleCrop() { if (!sharedImage) return; const canvas = document.getElementById('cropCanvas'); const ctx = canvas.getContext('2d'); const zoom = parseFloat(document.getElementById('cropZoom').value); const size = 200; canvas.width = size; canvas.height = size; const imgSize = Math.min(sharedImage.width, sharedImage.height) / zoom; const startX = (sharedImage.width - imgSize) / 2; const startY = (sharedImage.height - imgSize) / 2; ctx.clearRect(0, 0, size, size); ctx.drawImage(sharedImage, startX, startY, imgSize, imgSize, 0, 0, size, size); document.getElementById('cropZoomValue').innerText = zoom.toFixed(2) + 'x'; }
        function applySimpleCrop() { if (!sharedImage) return; const canvas = document.getElementById('cropCanvas'); const croppedImage = canvas.toDataURL('image/jpeg', 0.9); currentUserObj.profilePic = croppedImage; document.getElementById('modalAvatar').src = croppedImage; document.getElementById('avatarHeader').src = croppedImage; saveFullDB(); toast('✓ Avatar updated successfully!'); closeModal('settingsModal'); }
        function handleAdvancedUpload(input) { loadSharedImage(input.files[0]); }
        function drawAdvancedImage() { if (!sharedImage) return; const canvas = document.getElementById('advancedCanvas'); const ctx = canvas.getContext('2d'); const size = 200; canvas.width = size; canvas.height = size; const zoom = parseFloat(document.getElementById('advZoom').value); const posX = parseFloat(document.getElementById('advPosX').value); const posY = parseFloat(document.getElementById('advPosY').value); ctx.clearRect(0, 0, size, size); let imgW = sharedImage.width * zoom; let imgH = sharedImage.height * zoom; const offsetX = (posX / 100) * size; const offsetY = (posY / 100) * size; ctx.save(); ctx.translate(size/2, size/2); ctx.rotate(advRotation * Math.PI / 180); if (advFlipH) ctx.scale(-1, 1); if (advFlipV) ctx.scale(1, -1); ctx.drawImage(sharedImage, -imgW/2 + offsetX, -imgH/2 + offsetY, imgW, imgH); ctx.restore(); document.getElementById('advZoomValue').innerText = zoom.toFixed(2) + 'x'; document.getElementById('advPosXValue').innerText = posX; document.getElementById('advPosYValue').innerText = posY; }
        function rotateImage(degrees) { advRotation += degrees; drawAdvancedImage(); }
        function flipHorizontal() { advFlipH = !advFlipH; drawAdvancedImage(); }
        function flipVertical() { advFlipV = !advFlipV; drawAdvancedImage(); }
        function resetAdvanced() { document.getElementById('advZoom').value = 1; document.getElementById('advPosX').value = 0; document.getElementById('advPosY').value = 0; advRotation = 0; advFlipH = false; advFlipV = false; drawAdvancedImage(); }
        function applyAdvancedEdit() { if (!sharedImage) return; const canvas = document.getElementById('advancedCanvas'); const finalImage = canvas.toDataURL('image/jpeg', 0.9); currentUserObj.profilePic = finalImage; document.getElementById('modalAvatar').src = finalImage; document.getElementById('avatarHeader').src = finalImage; saveFullDB(); toast('✓ Avatar edited and saved!'); closeModal('settingsModal'); }
        function cancelCrop() { document.getElementById('simpleCropControls').style.display = 'none'; document.getElementById('cropCanvas').style.display = 'none'; }
        function cancelAdvancedEdit() { document.getElementById('advancedControls').style.display = 'none'; }
        
        document.addEventListener('DOMContentLoaded', () => {
            const zoomSlider = document.getElementById('cropZoom');
            if (zoomSlider) zoomSlider.addEventListener('input', () => drawSimpleCrop());
            const advZoom = document.getElementById('advZoom');
            const advPosX = document.getElementById('advPosX');
            const advPosY = document.getElementById('advPosY');
            if (advZoom) advZoom.addEventListener('input', () => drawAdvancedImage());
            if (advPosX) advPosX.addEventListener('input', () => drawAdvancedImage());
            if (advPosY) advPosY.addEventListener('input', () => drawAdvancedImage());
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const activeModals = document.querySelectorAll('.modal-glass.active');
                    if (activeModals.length > 0) {
                        activeModals.forEach(modal => { closeModal(modal.id); });
                    }
                }
            });
        });
        
        // ========== AUTH FUNCTIONS ==========
        async function handleLogin(e) { e.preventDefault(); let u = document.getElementById('loginUser').value.trim(); let p = document.getElementById('loginPass').value; if (!db.users[u]) return toast('User not found', 'error'); let user = db.users[u]; if (user.hashedPassword !== await sha256(p) || user.hashedUsername !== await sha256(u)) return toast('Wrong credentials', 'error'); db.currentUser = u; saveFullDB(); document.getElementById('loginContainer').classList.add('hidden'); document.getElementById('appContainer').classList.add('visible'); loadUser(); }
        async function handleRegister(e) { e.preventDefault(); let u = document.getElementById('regUser').value.trim(); let email = document.getElementById('regEmail').value; let q = document.getElementById('regQuestion').value; let ans = document.getElementById('regAnswer').value.trim().toLowerCase(); let pwd = document.getElementById('regPass').value; let conf = document.getElementById('regConfirm').value; if (pwd !== conf) return toast('Passwords do not match', 'error'); if (db.users[u]) return toast('Username already exists', 'error'); db.users[u] = { hashedUsername: await sha256(u), hashedPassword: await sha256(pwd), email, securityQuestion: q, hashedAnswer: await sha256(ans), profilePic: `https://ui-avatars.com/api/?name=${u}&background=6366f1&color=fff`, videos: [], playlists: { 'favorites': { name: 'Favorites', videoIds: [] }, 'watch-later': { name: 'Watch Later', videoIds: [] } } }; saveFullDB(); toast('Registration successful! Please login'); switchAuth('login'); }
        let recoveryStep = 0, recoveryTarget = null;
        async function handleRecovery(e) { e.preventDefault(); let user = document.getElementById('recUser').value.trim(); if (recoveryStep === 0) { if (!db.users[user]) return toast('User not found', 'error'); recoveryTarget = db.users[user]; document.getElementById('recoveryFields').style.display = 'block'; document.getElementById('recoverBtnAction').innerHTML = '<i class="fas fa-shield-alt"></i> Verify Answer'; recoveryStep = 1; } else if (recoveryStep === 1) { let ans = document.getElementById('recAnswer').value.trim().toLowerCase(); if (recoveryTarget.hashedAnswer !== await sha256(ans)) return toast('Wrong security answer', 'error'); document.getElementById('newPass').style.display = 'block'; document.getElementById('newPassConfirm').style.display = 'block'; document.getElementById('recoverBtnAction').innerHTML = '<i class="fas fa-key"></i> Reset Password'; recoveryStep = 2; } else { let np = document.getElementById('newPass').value; let npc = document.getElementById('newPassConfirm').value; if (np !== npc) return toast('Passwords do not match', 'error'); db.users[document.getElementById('recUser').value.trim()].hashedPassword = await sha256(np); saveFullDB(); toast('Password reset successfully! Please login'); switchAuth('login'); } }
        function switchAuth(mode) { const tabs = document.querySelectorAll('.auth-tab'); tabs.forEach(t => t.classList.remove('active')); if (event && event.target) event.target.classList.add('active'); else if (mode === 'login') tabs[0].classList.add('active'); document.getElementById('loginFormAuth').style.display = 'none'; document.getElementById('registerFormAuth').style.display = 'none'; document.getElementById('recoverFormAuth').style.display = 'none'; if (mode === 'login') document.getElementById('loginFormAuth').style.display = 'block'; else if (mode === 'register') document.getElementById('registerFormAuth').style.display = 'block'; else { document.getElementById('recoverFormAuth').style.display = 'block'; recoveryStep = 0; document.getElementById('recoveryFields').style.display = 'none'; document.getElementById('recoverBtnAction').innerHTML = '<i class="fas fa-key"></i> Find account'; } }
        function logout() { db.currentUser = null; saveFullDB(); location.reload(); }
        function openSettingsModal() { document.getElementById('settingsModal').classList.add('active'); const currentPic = currentUserObj.profilePic; document.getElementById('modalAvatar').src = currentPic || `https://ui-avatars.com/api/?name=${db.currentUser}&background=6366f1&color=fff`; document.getElementById('newUsername').value = db.currentUser; document.getElementById('newPasswordSettings').value = ''; if (currentPic && !currentPic.includes('ui-avatars.com')) { sharedImage = new Image(); sharedImage.onload = () => { sharedImageData = currentPic; if (currentEditorMode === 'crop') { document.getElementById('simpleCropControls').style.display = 'block'; document.getElementById('cropCanvas').style.display = 'block'; drawSimpleCrop(); } else { document.getElementById('advancedControls').style.display = 'block'; resetAdvanced(); drawAdvancedImage(); } }; sharedImage.src = currentPic; } else { sharedImageData = null; sharedImage = null; document.getElementById('simpleCropControls').style.display = 'none'; document.getElementById('cropCanvas').style.display = 'none'; document.getElementById('advancedControls').style.display = 'none'; } switchEditorMode('crop'); }
        async function saveSettings() { let newName = document.getElementById('newUsername').value.trim(); let newPwd = document.getElementById('newPasswordSettings').value; if (newName && newName !== db.currentUser) { if (db.users[newName]) return toast('Username taken', 'error'); let oldName = db.currentUser; let userData = db.users[oldName]; userData.hashedUsername = await sha256(newName); db.users[newName] = userData; delete db.users[oldName]; db.currentUser = newName; } if (newPwd) currentUserObj.hashedPassword = await sha256(newPwd); saveFullDB(); loadUser(); closeModal('settingsModal'); toast('Profile settings saved!'); }
        function openCreatePlaylist() { document.getElementById('createPlaylistModal').classList.add('active'); }
        function createPlaylistFinal() { let name = document.getElementById('newPlaylistName').value.trim(); if (!name) return toast('Playlist name required', 'error'); let id = 'pl_' + Date.now(); playlists[id] = { name, videoIds: [] }; db.users[db.currentUser].playlists = playlists; saveFullDB(); renderPlaylistSelectors(); closeModal('createPlaylistModal'); document.getElementById('newPlaylistName').value = ''; toast(`Playlist "${name}" created`); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        // ========== PLAYLIST SHARING FEATURE ==========
        let sharedViewActive = false;
        let sharedPlaylistData = null;

        function updateSharePlaylistSelect() {
            const shareSel = document.getElementById('sharePlaylistSelect');
            if (!shareSel) return;
            while (shareSel.options.length > 2) shareSel.remove(2);
            Object.keys(playlists).forEach(pid => {
                shareSel.add(new Option(playlists[pid].name, pid));
            });
        }

        function generateShareLink() {
            const selected = document.getElementById('sharePlaylistSelect').value;
            if (!selected) return toast('Select a playlist to share', 'error');
            
            let playlistName = '';
            let videoIds = [];
            
            if (selected === 'all') {
                playlistName = 'All Videos';
                videoIds = videos.map(v => v.id);
            } else if (selected === 'unassigned') {
                playlistName = 'Unassigned';
                videoIds = videos.filter(v => !v.playlistId || v.playlistId === 'unassigned').map(v => v.id);
            } else {
                playlistName = playlists[selected]?.name || 'Playlist';
                videoIds = videos.filter(v => v.playlistId === selected).map(v => v.id);
            }
            
            if (videoIds.length === 0) return toast('This playlist has no videos to share', 'error');
            
            const payload = {
                owner: db.currentUser,
                playlistId: selected,
                playlistName: playlistName,
                videoIds: videoIds,
                timestamp: Date.now()
            };
            const encoded = btoa(JSON.stringify(payload));
            const shareUrl = `${window.location.origin}${window.location.pathname}?shared=${encodeURIComponent(encoded)}`;
            document.getElementById('shareLinkDisplay').value = shareUrl;
            toast('Share link generated! Copy and send to friends');
        }

        function copyShareLink() {
            const input = document.getElementById('shareLinkDisplay');
            if (input.value) {
                input.select();
                navigator.clipboard.writeText(input.value);
                toast('Link copied to clipboard');
            } else {
                toast('Generate a link first', 'error');
            }
        }

        function renderSharedGrid(sharedVideos) {
            const container = document.getElementById('videoGrid');
            const emptyDiv = document.getElementById('emptyMessage');
            
            let filtered = sharedVideos.slice();
            if (currentFilterType !== 'all') {
                filtered = filtered.filter(v => v.platform === currentFilterType);
            }
            if (searchText) {
                filtered = filtered.filter(v => v.title.toLowerCase().includes(searchText) || v.url.toLowerCase().includes(searchText));
            }
            
            if (filtered.length === 0) {
                emptyDiv.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            emptyDiv.style.display = 'none';
            container.innerHTML = '';
            
            filtered.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card-mod';
                card.innerHTML = `
                    <div class="card-media" onclick="playVideo('${v.url.replace(/'/g, "\\'")}', '${escapeHtml(v.title).replace(/'/g, "\\'")}')">
                        <img src="${v.thumbnail}" onerror="this.src='https://placehold.co/640x360/1e293b/ffffff?text=No+Preview'">
                        <div class="play-btn-overlay"><i class="fas fa-play-circle fa-2x"></i></div>
                    </div>
                    <div class="card-info">
                        <div class="title-row" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
                        <div class="playlist-label" style="background: rgba(99,102,241,0.2);"><i class="fas fa-share-alt"></i> Shared from ${escapeHtml(sharedPlaylistData.owner)}</div>
                        <div class="meta-row">
                            <span><i class="far fa-calendar"></i> ${v.date}</span>
                            <span><i class="fab fa-${v.platform === 'youtube' ? 'youtube' : (v.platform === 'vimeo' ? 'vimeo' : 'globe')}"></i> ${v.platform}</span>
                        </div>
                        <div class="card-actions-row">
                            <button class="icon-btn" onclick="copyLink('${v.url.replace(/'/g, "\\'")}')" title="Copy link"><i class="fas fa-link"></i></button>
                            <button class="icon-btn" onclick="toast('Login to save this video to your library', 'error')" title="Save to library"><i class="fas fa-save"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function loadSharedFromURL() {
            const params = new URLSearchParams(window.location.search);
            const sharedData = params.get('shared');
            if (sharedData) {
                try {
                    const decoded = JSON.parse(atob(sharedData));
                    if (decoded.owner && decoded.videoIds && decoded.playlistName) {
                        const ownerData = db.users[decoded.owner];
                        if (ownerData && ownerData.videos) {
                            const ownerVideos = ownerData.videos;
                            const sharedVideos = ownerVideos.filter(v => decoded.videoIds.includes(v.id));
                            sharedPlaylistData = {
                                owner: decoded.owner,
                                playlistId: decoded.playlistId,
                                playlistName: decoded.playlistName,
                                videos: sharedVideos
                            };
                            sharedViewActive = true;
                            
                            document.getElementById('sharedPlaylistPreview').style.display = 'flex';
                            const shareSection = document.querySelector('.share-section');
                            if (shareSection) shareSection.style.display = 'none';
                            document.getElementById('sharedPlaylistName').innerText = decoded.playlistName;
                            document.getElementById('sharedOwnerName').innerText = decoded.owner;
                            document.getElementById('sharedVideoCount').innerText = sharedVideos.length;
                            
                            renderSharedGrid(sharedVideos);
                            toast(`Viewing shared playlist: ${decoded.playlistName} by ${decoded.owner}`, 'success');
                            
                            history.pushState({}, '', window.location.pathname);
                            return true;
                        } else {
                            toast('Owner not found or no videos available', 'error');
                        }
                    }
                } catch(e) {
                    console.error('Invalid share link', e);
                }
            }
            return false;
        }

        function clearSharedView() {
            sharedViewActive = false;
            sharedPlaylistData = null;
            document.getElementById('sharedPlaylistPreview').style.display = 'none';
            const shareSection = document.querySelector('.share-section');
            if (shareSection) shareSection.style.display = 'flex';
            if (db.currentUser) {
                renderGrid();
                toast('Back to your library');
            } else {
                location.reload();
            }
        }

        // Override filterAndRender to handle shared view
        const originalFilterAndRender = filterAndRender;
        filterAndRender = function() {
            searchText = document.getElementById('globalSearch').value.toLowerCase();
            if (sharedViewActive && sharedPlaylistData) {
                renderSharedGrid(sharedPlaylistData.videos);
            } else {
                originalFilterAndRender();
            }
        };

        // Override setFilter for shared view
        const originalSetFilter = setFilter;
        setFilter = function(type, btn) {
            currentFilterType = type;
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (sharedViewActive && sharedPlaylistData) {
                renderSharedGrid(sharedPlaylistData.videos);
            } else {
                originalSetFilter(type, btn);
            }
        };
        
        window.addEventListener('DOMContentLoaded', () => {
            if (db.currentUser && db.users[db.currentUser]) {
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('appContainer').classList.add('visible');
                loadUser();
            } else {
                document.getElementById('appContainer').classList.remove('visible');
            }
            loadSharedFromURL();
        });
    </script>
</body>
</html>
